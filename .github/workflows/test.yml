name: Test

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: cargo test + clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++ \
            libdbus-1-dev \
            libzmq3-dev \
            qt6-webengine-dev \
            libudev-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Force rustup stable on PATH (ubuntu-latest ships old system cargo)
        # Without this, `cargo build` invokes /usr/bin/cargo (1.75) which
        # doesn't support edition2024 and breaks on modern crates.
        run: |
          rustup default stable
          rustup show
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo build
        run: cargo build --all-features

      - name: cargo test
        run: cargo test --all-features

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
